# Enable mouse emulation.
CONFIG_ZMK_POINTING=y

# Deep sleep after 30 min (30*60*1000ms).
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Custom keyboard name (max. 16 characters).
CONFIG_ZMK_KEYBOARD_NAME="Rockorne"

# ZMK Studio (required for KeyPeek to read layout/keymap from device).
CONFIG_ZMK_STUDIO=y

# Bluetooth tweaks.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ── RGB Underglow (WS2812 LEDs) ──────────────────────────────────────
# Static pink/magenta matching Moonlander base layer color.
# NOTE: BRT_MAX is 20 (set in board defconfig), so BRT_START max is 20.
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=309
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
