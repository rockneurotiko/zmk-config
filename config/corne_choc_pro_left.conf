# ── Central-only settings (left half) ─────────────────────────────────
# These depend on ZMK_SPLIT_ROLE_CENTRAL which is only true on the left.

# Dual battery: show both central (left) and peripheral (right) levels.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# ── nice!view display (zmk-nice-oled module, nice_epaper shield) ─────
# Core display settings (auto-set by shield, listed for reference).
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_NICE_EPAPER_ON=y
CONFIG_NICE_OLED_ON=n

CONFIG_NICE_OLED_WIDGET_CENTRAL_SHOW_BATTERY_PERIPHERAL_AND_CENTRAL=y

# WPM with bongo cat (disable luna/speedometer to save space).
CONFIG_ZMK_WPM=y
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT_ANIMATION_MS=500
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n
CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=n
CONFIG_NICE_OLED_WIDGET_WPM_GRAPH=n

# Modifier indicators — disabled to avoid per-keypress display redraws
# which cause noticeable input lag on nRF52.
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=n

# HID indicators (CapsLock via bongo cat).
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_BONGO_CAT=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_BONGO_CAT_ANIMATION_MS=500
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_LUNA=n

# Raw HID — disabled (requires a companion app on the host;
# without it the display shows "HID not found").
CONFIG_NICE_OLED_WIDGET_RAW_HID=n

# Sleep art on idle (shows art when keyboard goes idle).
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_IDLE=y

# ── Battery-saving tweaks ────────────────────────────────────────────
# See DISPLAY_BATTERY_GUIDE.md for tuning options if battery drains fast.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
