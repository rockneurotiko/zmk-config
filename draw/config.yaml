parse_config:
  zmk_additional_includes:
    - "zmk-helpers/include"

  zmk_preamble: |
    #include "zmk-helpers/key-labels/36.h"
    #define CONFIG_WIRELESS

  raw_binding_map:
    "&sys_reset": Reset
    "&bootloader": Boot
    "&caps_word": Caps Word

    "&bt BT_SEL 0": BT 0
    "&bt BT_SEL 1": BT 1
    "&bt BT_SEL 2": BT 2
    "&bt BT_SEL 3": BT 3
    "&bt BT_CLR": BT Clr

    # Emacs macros
    "&cx_0": C-x 0
    "&cx_1": C-x 1
    "&cx_2": C-x 2
    "&cx_3": C-x 3
    "&cx_o": C-x o
    "&cx_b": C-x b
    "&cx_cs": C-x C-s
    "&cx_cw": C-x C-w
    "&cx_k": C-x k
    "&cx_cf": C-x C-f

    # Mouse
    "&mmv MOVE_UP": Mouse ↑
    "&mmv MOVE_DOWN": Mouse ↓
    "&mmv MOVE_LEFT": Mouse ←
    "&mmv MOVE_RIGHT": Mouse →
    "&msc SCRL_UP": Scroll ↑
    "&msc SCRL_DOWN": Scroll ↓
    "&msc SCRL_LEFT": Scroll ←
    "&msc SCRL_RIGHT": Scroll →
    "&mkp LCLK": LClick
    "&mkp RCLK": RClick
    "&mkp MCLK": MClick

    # Tap-dances
    "&td_pgup": {t: PgUp, h: "M-<"}
    "&td_pgdn": {t: PgDn, h: "M->"}
    "&td_csrc": {t: C-s, h: QRR}

  trans_legend: {t: "", type: trans}

  zmk_keycode_map:
    LALT: Alt
    RALT: Alt
    LCTRL: Ctrl
    RCTRL: Ctrl
    LGUI: Gui
    RGUI: Gui
    LSHFT: Shift
    RSHFT: Shift

    BSPC: Bspc
    DEL: Del
    ESC: Esc
    RET: Enter
    SPACE: Spc
    TAB: Tab

    PG_UP: PgUp
    PG_DN: PgDn
    INS: Ins
    HOME: Home
    END: End
    PSCRN: PrtSc

    UP: ↑
    DOWN: ↓
    LEFT: ←
    RIGHT: →

    C_MUTE: $$mdi:volume-off$$
    C_PP: $$mdi:play-pause$$
    C_VOL_UP: $$mdi:volume-high$$
    C_VOL_DN: $$mdi:volume-medium$$
    C_BRI_UP: $$mdi:brightness-7$$
    C_BRI_DN: $$mdi:brightness-5$$
    C_NEXT: $$mdi:skip-forward$$
    C_PREV: $$mdi:skip-backward$$

    AMPERSAND: "&"
    AMPS: "&"
    APOS: "'"
    APOSTROPHE: "'"
    ASTERISK: "*"
    ASTRK: "*"
    AT: "@"
    AT_SIGN: "@"
    BACKSLASH: \
    BSLH: \
    CARET: ^
    COLON: ":"
    COMMA: ","
    DLLR: $
    DOLLAR: $
    DOT: .
    DOUBLE_QUOTES: '"'
    DQT: '"'
    EQUAL: "="
    EXCL: "!"
    EXCLAMATION: "!"
    FSLH: /
    GRAVE: "`"
    GREATER_THAN: ">"
    GT: ">"
    HASH: "#"
    LBKT: "["
    LBRC: "{"
    LEFT_BRACE: "{"
    LEFT_BRACKET: "["
    LEFT_PARENTHESIS: (
    LESS_THAN: <
    LPAR: (
    LT: <
    MINUS: "-"
    PERCENT: "%"
    PERIOD: .
    PIPE: "|"
    PLUS: +
    PRCNT: "%"
    QMARK: "?"
    QUESTION: "?"
    RBKT: "]"
    RBRC: "}"
    RIGHT_BRACE: "}"
    RIGHT_BRACKET: "]"
    RIGHT_PARENTHESIS: )
    RPAR: )
    SEMI: ;
    SEMICOLON: ;
    SINGLE_QUOTE: "'"
    SLASH: /
    SQT: "'"
    STAR: "*"
    TILDE: "~"
    UNDER: _
    UNDERSCORE: _

draw_config:
  append_colon_to_layer_header: false
  dark_mode: auto
  footer_text: "rockneurotiko/zmk-config"
  glyph_tap_size: 14
  glyph_hold_size: 11
  glyph_shifted_size: 10
  legend_rel_y: 1
  outer_pad_w: 10
  outer_pad_h: 10
  small_pad: 4

  svg_style: |
    svg path { fill: inherit; }

    svg.keymap {
        --color-bg:      #1e1e2e;
        --color-key:     #313244;
        --color-text:    #cdd6f4;
        --color-ghost:   #585b70;
        --color-dendron: #45475a;
        --color-held:    #45475a;

        --color-syml:    #f38ba8;
        --color-symr:    #fab387;
        --color-fn:      #89b4fa;
        --color-num:     #a6e3a1;
        --color-nav:     #f9e2af;
        --color-mouse:   #cba6f7;
        --color-emacs:   #94e2d5;
        --color-sys:     #f5c2e7;

        fill: var(--color-text);
        background-color: var(--color-bg);
        font-family: 'JetBrains Mono', 'Fira Code', monospace, system-ui;
        font-size: 14px;
        font-kerning: normal;
        text-rendering: optimizeLegibility;
    }

    text {
        text-anchor: middle;
        dominant-baseline: middle;
        letter-spacing: 0.02em;
    }

    text.tap     { font-weight: 500; }
    text.hold    { font-weight: 400; font-size: 12px; }
    text.shifted { font-weight: 400; font-size: 10px; }
    text.combo, text.left, text.right, text.tl, text.tr, text.bl, text.br { font-size: 10px; }

    text.hold, text.bl, text.br    { text-anchor: middle; dominant-baseline: auto; }
    text.shifted, text.tl, text.tr { text-anchor: middle; dominant-baseline: hanging; }
    text.left, text.tl, text.bl    { text-anchor: start; }
    text.right, text.tr, text.br   { text-anchor: end; }

    text.layer-activator { text-decoration: underline; }
    text.combo.hold, text.combo.shifted, text.combo.left, text.combo.right { font-size: 8px; }

    text.label, text.footer {
        fill: var(--color-text);
        stroke: var(--color-bg);
        stroke-width: 4;
        paint-order: stroke;
    }
    text.label  { font-weight: bold; text-anchor: start; }
    text.footer { text-anchor: end; dominant-baseline: auto; }

    rect.key, rect.combo, rect.combo-separate { fill: var(--color-key); stroke-width: 0; rx: 6; }
    rect.held, rect.combo.held                { fill: var(--color-held); }
    .layer-Combos rect.key                    { fill: var(--color-ghost); }

    path.combo { stroke: var(--color-dendron); stroke-width: 2; stroke-dasharray: 2, 3; opacity: 0.45; fill: none; }

    .icon-tabler > path                             { fill: inherit; stroke: inherit; stroke-width: 2; }
    .icon-tabler > path[stroke="none"][fill="none"] { visibility: hidden; }

    @media (prefers-color-scheme: light) {
        svg.keymap {
            --color-bg:      #eff1f5;
            --color-key:     #ccd0da;
            --color-text:    #4c4f69;
            --color-ghost:   #9ca0b0;
            --color-dendron: #bcc0cc;
            --color-held:    #bcc0cc;

            --color-syml:    #d20f39;
            --color-symr:    #fe640b;
            --color-fn:      #1e66f5;
            --color-num:     #40a02b;
            --color-nav:     #df8e1d;
            --color-mouse:   #8839ef;
            --color-emacs:   #179299;
            --color-sys:     #ea76cb;
        }
    }
